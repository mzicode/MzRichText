apply plugin: 'com.android.library'
apply plugin: 'maven-publish'
apply plugin: 'signing'

def publishedGroupId = 'io.github.mzicode'
def publishedArtifactId = 'mz-richtext'
def publishedVersion = '0.1.0'

android {
    namespace 'com.mz.richtext'
    compileSdkVersion 34


    defaultConfig {
        minSdkVersion 16
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    publishing {
        singleVariant('release') {
            withSourcesJar()
        }
    }
}

dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    testImplementation 'junit:junit:4.12'
}

afterEvaluate {
    publishing {
        repositories {
            maven {
                name = 'MavenCentral'
                url = uri(publishedVersion.endsWith('SNAPSHOT')
                        ? 'https://central.sonatype.com/repository/maven-snapshots/'
                        : 'https://ossrh-staging-api.central.sonatype.com/service/local/staging/deploy/maven2/')
                credentials {
                    username = findProperty('mavenCentralUsername') ?: System.getenv('MAVEN_CENTRAL_USERNAME')
                    password = findProperty('mavenCentralPassword') ?: System.getenv('MAVEN_CENTRAL_PASSWORD')
                }
            }
        }

        publications {
            release(MavenPublication) {
                from components.release
                groupId = publishedGroupId
                artifactId = publishedArtifactId
                version = publishedVersion

                pom {
                    name = 'MzRichText'
                    description = 'A lightweight Android rich text view and editor for text and images.'
                    url = 'https://github.com/mzicode/MzRichText'
                    licenses {
                        license {
                            name = 'The Apache License, Version 2.0'
                            url = 'https://www.apache.org/licenses/LICENSE-2.0.txt'
                        }
                    }
                    developers {
                        developer {
                            id = 'mzicode'
                            name = 'mzicode'
                        }
                    }
                    scm {
                        connection = 'scm:git:git://github.com/mzicode/MzRichText.git'
                        developerConnection = 'scm:git:ssh://github.com/mzicode/MzRichText.git'
                        url = 'https://github.com/mzicode/MzRichText'
                    }
                }
            }
        }
    }

    signing {
        def signingKey = findProperty('signingKey') ?: System.getenv('SIGNING_KEY')
        def signingPassword = findProperty('signingPassword') ?: System.getenv('SIGNING_PASSWORD')
        required {
            gradle.taskGraph.allTasks.any { it.name.contains('MavenCentral') }
        }
        if (signingKey) {
            useInMemoryPgpKeys(signingKey, signingPassword)
            sign publishing.publications.release
        }
    }
}
